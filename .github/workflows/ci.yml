name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: marketplace_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: marketplace.settings
      SECRET_KEY: ci-secret
      DEBUG: 'False'
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: marketplace_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: 127.0.0.1
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8

      - name: Wait for Postgres
        run: |
          python - <<'PY'
import os, time
import psycopg2
for i in range(30):
    try:
        conn = psycopg2.connect(dbname=os.environ['DB_NAME'], user=os.environ['DB_USER'], password=os.environ['DB_PASSWORD'], host=os.environ['DB_HOST'], port=os.environ['DB_PORT'])
        conn.close()
        print('Postgres ready')
        break
    except Exception as e:
        print('Waiting for Postgres...', i)
        time.sleep(1)
else:
    raise SystemExit('Postgres did not become ready')
PY

      - name: Run migrations
        run: |
          python manage.py migrate --noinput

      - name: Run tests
        run: |
          python manage.py test

      - name: Run linters
        run: |
          black --check .
          flake8 . --max-line-length=100
