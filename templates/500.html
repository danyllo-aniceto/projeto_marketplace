<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro interno — Tech Hub</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #041123;
            color: #eef7ff;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            text-align: center;
            padding: 1.5rem;
        }
        .box { max-width: 460px; }
        .code {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #3af6ff, #0fa7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h1 { font-size: 1.4rem; margin: 0.5rem 0; }
        p { color: #9bb1ca; line-height: 1.6; }
        a {
            display: inline-block;
            margin-top: 1.25rem;
            padding: 0.7rem 1.5rem;
            background: linear-gradient(135deg, #3af6ff, #0fa7ff);
            color: #041123;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="code">500</div>
        <h1>Algo deu errado</h1>
        <p>Tivemos um problema ao processar sua solicitação. Tente novamente em instantes.</p>
        <a href="/">Voltar ao início</a>
    </div>
</body>
</html>
